<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">Unicorn Skills</title>
  <desc id="desc">A pastel rainbow banner with a stylized unicorn and the wordmark Unicorn Skills.</desc>

  <defs>
    <!-- Background gradient: warm pink to violet to soft blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD4E5"/>
      <stop offset=".45" stop-color="#D7B6FF"/>
      <stop offset="1" stop-color="#A6E1FF"/>
    </linearGradient>

    <!-- Soft glow behind the unicorn -->
    <radialGradient id="glow" cx=".35" cy=".55" r=".55">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".75"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Rainbow mane gradient -->
    <linearGradient id="mane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B9E"/>
      <stop offset=".25" stop-color="#FFB347"/>
      <stop offset=".5" stop-color="#FFE66D"/>
      <stop offset=".75" stop-color="#7FE7B8"/>
      <stop offset="1" stop-color="#7AB8FF"/>
    </linearGradient>

    <!-- Horn gradient -->
    <linearGradient id="horn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFD86B"/>
      <stop offset="1" stop-color="#FFF7B2"/>
    </linearGradient>

    <!-- Tail gradient -->
    <linearGradient id="tail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7AB8FF"/>
      <stop offset=".5" stop-color="#C58BFF"/>
      <stop offset="1" stop-color="#FF8BC4"/>
    </linearGradient>

    <!-- Soft body shadow -->
    <linearGradient id="bodyShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1E6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="480" fill="url(#bg)"/>

  <!-- Distant sparkles -->
  <g fill="#FFFFFF" opacity=".75">
    <circle cx="120" cy="80" r="3"/>
    <circle cx="220" cy="140" r="2"/>
    <circle cx="1080" cy="90" r="3"/>
    <circle cx="1180" cy="180" r="2"/>
    <circle cx="980" cy="40" r="2.5"/>
    <circle cx="80" cy="380" r="2"/>
    <circle cx="1200" cy="380" r="2.5"/>
    <circle cx="640" cy="60" r="2"/>
  </g>

  <!-- Four-pointed sparkles -->
  <g fill="#FFFFFF">
    <path d="M150,260 l4,-14 l4,14 l14,4 l-14,4 l-4,14 l-4,-14 l-14,-4 z"/>
    <path d="M1100,300 l3,-10 l3,10 l10,3 l-10,3 l-3,10 l-3,-10 l-10,-3 z" opacity=".9"/>
    <path d="M260,400 l2.5,-8 l2.5,8 l8,2.5 l-8,2.5 l-2.5,8 l-2.5,-8 l-8,-2.5 z" opacity=".85"/>
  </g>

  <!-- Glow under the unicorn -->
  <ellipse cx="380" cy="260" rx="320" ry="200" fill="url(#glow)"/>

  <!-- Unicorn group -->
  <g transform="translate(180,90)">

    <!-- Tail -->
    <path d="M28,210
             C-30,200 -50,150 -10,120
             C-40,170 10,200 50,180
             C20,200 30,210 28,210 Z"
          fill="url(#tail)"/>

    <!-- Body -->
    <path d="M40,210
             C40,150 110,120 200,130
             C280,140 330,170 340,220
             C345,260 320,290 270,295
             L260,330 C260,340 248,340 248,330 L248,300
             L160,300 L160,330 C160,340 148,340 148,330 L148,295
             C90,295 50,265 40,230 Z"
          fill="url(#bodyShade)" stroke="#3B2A60" stroke-width="3" stroke-linejoin="round"/>

    <!-- Neck + head -->
    <path d="M260,165
             C310,90 380,70 410,90
             C430,55 460,55 470,80
             C490,70 510,90 500,115
             C530,120 540,150 520,170
             L490,180
             C500,210 480,235 450,235
             L400,230
             C370,225 345,210 330,185
             C305,200 280,200 260,190 Z"
          fill="url(#bodyShade)" stroke="#3B2A60" stroke-width="3" stroke-linejoin="round"/>

    <!-- Ear -->
    <path d="M425,80 L440,40 L455,80 Z"
          fill="#FFFFFF" stroke="#3B2A60" stroke-width="3" stroke-linejoin="round"/>
    <path d="M432,75 L440,55 L448,75 Z" fill="#FFB6D5"/>

    <!-- Horn -->
    <path d="M455,55 L470,-5 L485,55 Z"
          fill="url(#horn)" stroke="#B58A1C" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M461,40 L478,40 M464,25 L476,25 M467,10 L473,10"
          stroke="#B58A1C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mane -->
    <path d="M460,90
             C500,100 540,140 540,180
             C570,160 595,180 590,210
             C620,200 640,225 625,250
             C640,260 640,285 615,290
             C625,310 605,330 580,320
             C580,340 555,348 540,335
             C530,355 500,355 490,335
             C475,348 450,345 445,325
             C420,335 395,320 400,295
             C380,300 365,285 370,265
             C350,265 340,245 355,228
             C338,218 340,195 360,190
             C355,170 372,150 392,155
             C390,135 410,120 430,128
             C432,108 450,98 460,90 Z"
          fill="url(#mane)" stroke="#3B2A60" stroke-width="3" stroke-linejoin="round"/>

    <!-- Eye -->
    <ellipse cx="465" cy="135" rx="6" ry="8" fill="#3B2A60"/>
    <circle cx="467" cy="132" r="2" fill="#FFFFFF"/>

    <!-- Cheek blush -->
    <ellipse cx="495" cy="160" rx="14" ry="7" fill="#FFB6D5" opacity=".75"/>

    <!-- Smile -->
    <path d="M508,178 C513,184 518,184 522,178" stroke="#3B2A60" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Hoof shading -->
    <rect x="148" y="320" width="20" height="14" rx="3" fill="#3B2A60" opacity=".85"/>
    <rect x="248" y="320" width="20" height="14" rx="3" fill="#3B2A60" opacity=".85"/>

  </g>

  <!-- Wordmark -->
  <g transform="translate(740,180)" font-family="ui-rounded, 'SF Pro Rounded', 'Avenir Next', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="96" font-weight="800" fill="#2A1F4F" letter-spacing="-2">Unicorn</text>
    <text x="0" y="92" font-size="96" font-weight="800" fill="#2A1F4F" letter-spacing="-2">Skills</text>
    <text x="6" y="140" font-size="22" font-weight="600" fill="#5B4A8A" letter-spacing=".5">
      A Claude Code starter — design, accessibility &amp; engineering.
    </text>
    <g transform="translate(6,168)" font-size="18" font-weight="700" fill="#2A1F4F">
      <rect x="0"   y="0" width="120" height="34" rx="17" fill="#FFFFFF" opacity=".75"/>
      <text x="60"  y="22" text-anchor="middle">112 skills</text>
      <rect x="132" y="0" width="140" height="34" rx="17" fill="#FFFFFF" opacity=".75"/>
      <text x="202" y="22" text-anchor="middle">27 commands</text>
      <rect x="284" y="0" width="120" height="34" rx="17" fill="#FFFFFF" opacity=".75"/>
      <text x="344" y="22" text-anchor="middle">4 agents</text>
    </g>
  </g>
</svg>
